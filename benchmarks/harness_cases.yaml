# ---
# id: DATASET-harness-cases
# layer: dataset
# purpose: A/B benchmark scaffold for the adaptive-harness system itself - pre-registered cases (DR-016) covering skill activation, rolling loop value, invocation paths, and context strategies; complements ai_review_cases.yaml (which owns the AI-review-side cases).
# read_when: experiment_design mode; when an adaptive-harness recommendation is classified Experiment; after any case completes, to record the verdict.
# depends_on: [../schemas/recommendation.schema.yaml, ../docs/ab_test_protocol.md, ./ai_review_cases.yaml]
# used_by: [SCRIPT-run-adaptive-harness-review, SKILL-adaptive-harness]
# tags: [dataset, benchmark, ab-test, adaptive-harness, pre-registration]
# retrieval_keywords: [harness benchmark cases, skill adapter vs root skill, rolling loop vs one time review, context reset vs continuous, invocation path benchmark, ai review plus adaptive harness]
# ---
# Format contract: flat blocks parseable by run_ai_review.py::parse_benchmark_cases.
# status enum: proposed | running | completed | rejected.
# Overlapping case classes (planning, todo, scan scope, subagent, codex, report
# generation) are owned by benchmarks/ai_review_cases.yaml - NOT duplicated here.
# Same ceiling caveat applies (memory: harness-ab-ceilings-on-opus): use tasks
# with headroom or the arms tie at ceiling.

cases:
  - case_name: root_skill_only_vs_adaptive_skill_adapter
    task_type: skill_activation
    variant_a: "Harness maintenance task started from root SKILL.md only (repo-level launcher)"
    variant_b: "Same task started via .claude/skills/adaptive-harness/SKILL.md adapter"
    expected_metrics: "correct mode selection rate, files loaded before first action, time-to-first-runner-call, safety-boundary violations"
    success_criteria: "Keep the adapter if it reduces files-loaded and mis-mode rate with zero safety regressions; else fold its table into the root file"
    manual_review_notes: "Run with a fresh session per arm; the adapter's narrow description should also reduce false-trigger rate on non-harness tasks - probe that separately."
    status: proposed
    linked_recommendation_id: REC-20260706-033

  - case_name: ai_review_only_vs_ai_review_plus_adaptive_harness
    task_type: review_system_composition
    variant_a: "AI-review runs alone; findings tracked manually across weeks"
    variant_b: "AI-review + rolling_improvement_review linking new/repeated/resolved via REC-id commits"
    expected_metrics: "findings lost between runs, re-derivation cost per session, time from finding to applied fix, repeated-finding detection rate"
    success_criteria: "B justifies its complexity iff repeated findings are detected mechanically (A misses them) AND per-session re-derivation drops measurably; otherwise simplify B away"
    manual_review_notes: "This is the load-bearing case for the whole Phase-2 system - if B loses, the rolling loop should be reduced to a script that greps history."
    status: proposed
    linked_recommendation_id: REC-20260706-034

  - case_name: one_time_skill_review_vs_rolling_improvement_loop
    task_type: maintenance_cadence
    variant_a: "Quarterly one-shot deep harness review (current /ai-review quarterly tier alone)"
    variant_b: "Weekly light rolling loop (diff_only + rolling_improvement) + quarterly deep"
    expected_metrics: "drift caught per month, mean staleness age of caught drift, total review token cost per quarter"
    success_criteria: "B wins if drift staleness age drops >=50% at <=1.5x quarterly token cost; else keep quarterly-only"
    manual_review_notes: "Use the deterministic issue counts (index_drift, deprecated markers) as the objective drift signal."
    status: proposed
    linked_recommendation_id: REC-20260706-035

  - case_name: current_invocation_path_vs_simplified_invocation_path
    task_type: invocation_efficiency
    variant_a: "Current hook wiring (4 separate PreToolUse-Bash Python hooks; 3 UserPromptSubmit hooks; statusline_pro.mjs present)"
    variant_b: "Simplified wiring per OPT-20260706-002/003/004 (merged dispatchers, statusline removed)"
    expected_metrics: "per-Bash-call latency, per-prompt latency, hook verdict parity on replayed payloads, forks per session"
    success_criteria: "B ships iff verdict parity is 100% on replayed logged payloads AND latency drops >=150ms/Bash-call; any parity break = keep A"
    manual_review_notes: "Replay corpus: real payloads from ~/.claude/logs/hook_events.jsonl. This case gates OPT-002/003/004 - hooks are governance, human applies."
    status: proposed
    linked_recommendation_id: REC-20260706-036

  - case_name: task_splitter_vs_handrolled_multi_delegate
    task_type: multi_delegate_coordination
    variant_a: "agent-task-splitter → per-delegate briefs → agent-output-reconciler → agent-acceptance-gate (the mandated .coord/ pipeline)"
    variant_b: "Hand-rolled: orchestrator writes 2 codex briefs directly, reviews both outputs itself, no .coord/ artifacts"
    expected_metrics: "end-to-end wall-clock; total tokens incl. splitter/reconciler overhead; conflicts or drift caught by the reconciler; rework rounds; rollback granularity (one commit per agent boundary); audit-trail completeness"
    success_criteria: "A justifies its overhead iff (reconciler catches >=1 real conflict/drift OR rework drops) at <=1.3x the token cost of B; if A only adds ceremony on clean runs, propose downgrading the mandate to >=3-delegate rounds"
    manual_review_notes: "HONEST STATUS: the pipeline has NEVER fired in real use (0/7 repos per AGENTS.md) - efficiency is UNVERIFIED, not established. Cross-AI scope today = Codex xN (Gemini lane dead); any future delegate CLI reuses the same task-file contract, so the case stays valid. Needs a real >=2-delegate round + quota; run alongside mc08/mc09 to amortize the Codex spend."
    status: proposed
    linked_recommendation_id: REC-20260706-012

  - case_name: context_reset_vs_continuous_context
    task_type: long_session_strategy
    variant_a: "Forced context reset / handoff between review phases (fresh session per phase)"
    variant_b: "Continuous single-session context across phases (current-model long-range reasoning)"
    expected_metrics: "cross-phase consistency errors, re-reading cost after reset, dropped-thread count, wall-clock"
    success_criteria: "Adopt B as default if consistency errors do not increase and re-reading cost drops; keep resets only for context-budget overflow"
    manual_review_notes: "Ceiling risk HIGH - needs a genuinely long multi-phase task; the 3-phase harness upgrade itself is the reference workload shape."
    status: proposed
    linked_recommendation_id: REC-20260706-037

  - case_name: model_routing_playbook_vs_all_strong
    task_type: model_tier_routing
    variant_a: "All 10 fixture subtasks executed on the session's strong model (all-strong baseline)"
    variant_b: "Routed per core/model_routing_playbook.md: strong router classifies each subtask; mechanical -> cheap tier (Haiku-class), honesty-critical -> strong tier"
    expected_metrics: "per-subtask correctness (deterministic grader), whole-workload all-correct rate, routing accuracy vs gold labels, honesty-misroute count, cost proxy (cheap = 0.1x strong)"
    success_criteria: "B ships iff B cost <= 0.5x A AND honesty-misroutes = 0 AND B whole-workload rate >= A whole-workload rate, at k >= 3; ANY honesty misroute fails the case regardless of cost"
    manual_review_notes: "Fixture, gold labels and grader are tracked in benchmarks/route_cost_ab/ (promotion of the gitignored 2026-07-08 evals/route_ab demo - the flagship ~2.5x claim must be re-runnable from the repo). Metrics are all ceiling-immune (cost/routing/stability, never quality-lift). Dispatch prompts VERBATIM, one subtask per agent. EXECUTED 2026-07-09 (k=3, 63 agents, blind router): B cost 0.37x (<=0.5x PASS), honesty misroutes 0 (PASS), whole-workload B 3/3 = A 3/3 (PASS) - all three criteria met; raw runs in evals/route_cost_ab_20260709/ (local), scorecard reproduced by check_route_ab.py."
    status: completed
    linked_recommendation_id: none - wave-plan item W1 (2026-07 optimization program; no formal REC record minted)

  - case_name: validator_verbose_vs_quiet
    task_type: validator_output_economy
    variant_a: "Validators print every OK/PASS row (verbose default): check_agent_artifacts.py, check_adaptive_harness.py, integration_check.py"
    variant_b: "Same validators with --quiet: OK/PASS rows suppressed; FAIL/MISSING/POSTURE lines + one-line summary print verbatim; pre-commit hook calls --quiet"
    expected_metrics: "clean-tree stdout bytes per script (both modes), seeded-violation block parity (exit codes equal AND failure lines byte-identical), zero swallowed failures"
    success_criteria: "B ships iff clean-tree quiet bytes <= 10% of verbose AND 5/5 seeded violations block identically in both modes (exit parity + failure-line byte-parity); any swallowed failure = keep verbose"
    manual_review_notes: "Criteria pre-registered in the 2026-07-09 audit round-1 token-cost P0 finding (validator OK-noise ~450 tok/commit re-entering agent context). EXECUTED 2026-07-09: clean-tree 3,670B -> 93B = 2.53% (PASS <=10%; measured on one clean-tree snapshot - expect small run-to-run variance since integration_check shells out to git; reviewer re-measure got 3,753B -> 97B = 2.59%, same verdict); seeded violations 5/5 parity (keyword-removed, depends_on-broken, ROUTES-ghost, adaptive-keyword, required-file-missing) - exit codes equal, failure lines byte-identical, zero swallowed. Deviations from the pre-registered ab_design, disclosed: executed as direct validator invocations on 1 clean state + 5 seeded states (not 20 scripted git commits / 15 clean), and the seed set substituted a second keyword case (adaptive-keyword) for the pre-registered posture-conflict case; POSTURE-line non-suppression was verified separately by the code-review re-test and is now pinned by a permanent regression in scripts/test_check_agent_artifacts.py. V1's first seed was case-sensitive and did not trigger; re-seeded case-insensitively before recording. Verbose remains the default; --quiet is opt-in for hooks/in-session runs."
    status: completed
    linked_recommendation_id: none - wave-plan item W2 (2026-07 optimization program; no formal REC record minted)

  - case_name: grep_entry_vs_wholesale_read
    task_type: context_load_economy
    variant_a: "Wholesale Reads: ROUTES.yaml whole (~20.4kB) per route activation; INDEX.yaml whole (~98.5kB) per lookup or MT-5 sweep"
    variant_b: "Grep-entry discipline: scripts/route_show.py prints one validated route entry (+--header on first activation); INDEX lookups grep the entry (path or retrieval keyword, ~7 lines); the MT-5 sweep runs scripts/index_diff.py (two-way set-diff vs git ls-files, prints only mismatches)"
    expected_metrics: "bytes entering context per operation (both arms), drift-detection parity for the mechanical MT-5 classes (ghost / unindexed / duplicate), entry-content completeness (route_show block == the block inside the wholesale read)"
    success_criteria: "B ships iff route entry <= 20% of whole-ROUTES bytes AND 3-entry INDEX lookup <= 10% of whole-INDEX bytes AND index_diff detects 3/3 seeded mechanical drift classes with clean restore; purpose-string drift is explicitly OUT OF SCOPE for the script and must be disclosed wherever MT-5 is referenced"
    manual_review_notes: "Criteria pre-registered in the 2026-07-09 audit round-1 token-cost P0 findings (INDEX 23.5k tok wholesale for ~350-tok lookups; ROUTES 5k tok for one ~407-tok entry). EXECUTED 2026-07-09, measured against the shipping files: route_show ROUTE-global-orchestration entry 2,742B vs 20,775B whole = 13.2% (PASS <=20%); 3-entry INDEX grep (grep -A6, entries: core/model_routing_playbook.md 557B + scripts/index_diff.py 547B + docs/evidence.md 615B = 1,719B) vs 98,596B whole = 1.7% (PASS <=10%); index_diff seeded ghost/unindexed/duplicate 3/3 detected, exit 1 each, clean restore exit 0, PLUS the review-found spaced-path case (a ghost entry whose path contains a space passed CLEAN under the original regex) fixed and re-verified with the reviewer's exact seed. Empirical inclusion rule verified before build: INDEX entries == git ls-files exactly (204=204 clean tree, no exceptions). Deviation from the audit fix-sketch, disclosed: the audit proposed a grep -A window for ROUTES; a fixed window truncates long entries, so route_show.py parses entry boundaries instead. index_diff also caught its own two unindexed script files live during development (self-referential validation). Purpose-string drift remains judgment - stated in the script docstring, INDEX header, and MT-5 self_check."
    status: completed
    linked_recommendation_id: none - wave-plan item W2b (2026-07 optimization program; no formal REC record minted)

  - case_name: l2_hot_cold_split
    task_type: context_load_economy
    variant_a: "L2_current_phase.md monolith (11,677B) in the start ladder of all 8 project routes - ~71% history per the audit"
    variant_b: "Hot/cold split: L2 keeps state + allowed/forbidden + honesty anchors + Phase-3 obligations; full milestone table, N=2 gate narratives, and the deliverable chronicle move to context/L2_phase_history.md (not in any start ladder)"
    expected_metrics: "hot-file bytes per task (every route pays it), zero loss of load-bearing constraints (allowed/forbidden verbatim, honesty anchors survive in compressed form), validators/probes parity"
    success_criteria: "B ships iff hot L2 <= 60% of the monolith AND the allowed/forbidden section is byte-preserved AND the two-NULLs honesty anchor (claim NOT SUPPORTED, published-not-rerun) survives in the hot file AND all validators/probes pass"
    manual_review_notes: "From the 2026-07-09 audit round-1 P1 (L2 71% cold history, ~2,044 tok/task). EXECUTED 2026-07-09: hot L2 6,086B = 52% of 11,677B (PASS <=60%; well above the audit's most-aggressive theoretical floor of 29% because the honesty anchors and the full allowed/forbidden block deliberately stay hot); allowed/forbidden verbatim; honesty anchor kept as a compressed bullet with pointer; history file 7,105B loads on demand only. Validators, probes, graph all green post-split."
    status: completed
    linked_recommendation_id: none - wave-plan item W2c1 (2026-07 optimization program; no formal REC record minted)

  - case_name: report_brief_vs_full_json
    task_type: report_load_economy
    variant_a: "LLM sessions read reports/ai-review/latest.json whole (measured 12.8k tokens on a full run; 7,444B on a clean smoke run)"
    variant_b: "write_outputs also emits latest-brief.json - counts, per-issue one-liners (description capped 160 chars), recommendation id/priority index, next trigger; latest.json unchanged as the runners' programmatic input"
    expected_metrics: "brief bytes vs full bytes on the same run; brief carries every decision field (issue ids/severities, rec ids/priorities, next trigger); shared-writer contract intact (DR-020, one writer both runners); test suite parity"
    success_criteria: "B ships iff brief <= 20% of full on the same run AND the decision fields enumerated above are all present AND pytest scripts/ stays green (no writer fork)"
    manual_review_notes: "From the 2026-07-09 audit round-1 ai-review P1 (report-loading tax ~11k tok/load). EXECUTED 2026-07-09 on a standard_review --no-home smoke run: latest-brief.json 486B vs latest.json 7,444B = 6.5% (PASS <=20%); brief keys verified (issues, recommendation_index, next_review_trigger, counts); 66/66 scripts tests pass post-change. NOTE: the brief is emitted by the shared write_outputs (serves both runners per DR-020, not forked); the operator-side pointer flip (commands/ai-review.md telling sessions to read the brief) is a separate ~/.claude change, tracked for the operator batch."
    status: completed
    linked_recommendation_id: none - wave-plan item W2c2 (2026-07 optimization program; no formal REC record minted)
