# ---
# id: INDEX
# layer: context
# purpose: Complete file inventory - every content file with id, layer, purpose, tags, read_when, for targeted retrieval.
# read_when: You know WHAT you need but not WHERE it lives; during repo-maintenance drift sweeps.
# depends_on: [HARNESS.yaml, ROUTES.yaml]
# used_by: [ROUTE-repo-maintenance, ROUTE-phase-review, ROUTE-tool-discovery, ROUTE-pr-review, ROUTE-eval-design, ROUTE-memory-update, ROUTE-runtime-export, ROUTE-ab-test-design]
# tags: [index, inventory, retrieval]
# retrieval_keywords: [file inventory, where does X live, index of files, path lookup, layer map]
# ---
# Regenerate check: every content file on disk must appear here exactly once
# (a missing file in INDEX is a defect - see ROUTE-repo-maintenance self_check MT-5).

files:

  - path: .gitignore
    id: GITIGNORE
    layer: doc
    purpose: "Never-commit list - secrets, env files, caches, scratch artifacts, generated review reports (see docs/publication_status.md)."
    tags: ["gitignore", "publication", "hygiene"]
    read_when: "Adding a new artifact class to the repo, or auditing the public-safety posture."

  - path: .gitattributes
    id: GITATTRIBUTES
    layer: doc
    purpose: "Line-ending policy - pins shell hooks (scripts/hooks/*) to LF so a CRLF-defaulting editor or clone cannot silently break the POSIX pre-commit hook."
    tags: ["gitattributes", "line-endings", "hooks", "hygiene"]
    read_when: "Adding a shell script / hook, or debugging a CRLF-related hook failure."

  - path: HARNESS.yaml
    id: HARNESS-manifest
    layer: doc
    purpose: "Package manifest - name, version, entrypoint, provenance, layer vocabulary, pinned route list, constraints."
    tags: ["manifest", "provenance", "routes", "constraints"]
    read_when: "Orienting on what this package declares about itself; validating against schemas/harness_repo.schema.yaml."

  - path: INDEX.yaml
    id: INDEX
    layer: context
    purpose: "Complete file inventory - every content file with id, layer, purpose, tags, read_when, for targeted retrieval."
    tags: ["index", "inventory", "retrieval"]
    read_when: "You know WHAT you need but not WHERE it lives; during repo-maintenance drift sweeps."

  - path: README.md
    id: README
    layer: doc
    purpose: "Explain what this harness repo is, what it is not, and how to enter it"
    tags: ["entrypoint", "overview", "privacy"]
    read_when: "First contact with the repo, or when unsure how the pieces fit"

  - path: ROUTES.yaml
    id: ROUTES
    layer: context
    purpose: "The 8 pinned project-bound routes plus 3 portable core routes - per task type, the minimal file set, expected deliverable, and pre-return self-checks."
    tags: ["routes", "routing", "file-sets", "progressive-disclosure"]
    read_when: "Immediately after L3 classification, before opening any playbook/rubric/example file."

  - path: context/L0_bootstrap.md
    id: L0-bootstrap
    layer: context
    purpose: "Minimal first read — orient in under 300 words, then route"
    tags: ["bootstrap", "entrypoint", "first-read"]
    read_when: "Start of every session in this repo, before anything else"

  - path: context/L1_project_constitution.md
    id: L1-project-constitution
    layer: context
    purpose: "The source project's thesis, non-goals, and stable operating principles"
    tags: ["constitution", "thesis", "non-goals", "principles"]
    read_when: "A decision touches project identity, scope boundaries, or a principle conflict"

  - path: context/L2_current_phase.md
    id: L2-current-phase
    layer: context
    purpose: "The source project's real current phase — what is allowed and forbidden right now"
    tags: ["phase", "current-state", "scope", "allowed", "forbidden"]
    read_when: "Start of every task, immediately after L0 — before classifying or acting"

  - path: context/L3_task_router.md
