id: RUBRIC-pr-review
layer: rubric
purpose: Score a PR / commit-range review against the repo's layered-review
  discipline - work-order scope match, mutation tests for schema edits,
  computed artifacts, independent re-verification, staged-commit hygiene.
read_when: Reviewing any diff before commit or merge, including delegate
  output.
depends_on:
  - ../validation/self_checklists/pr_review_checklist.md
  - ./eval_quality_rubric.yaml
used_by:
  - ROUTE-pr-review
tags: [pr-review, diff, verification, commit-hygiene, schema-change]
retrieval_keywords: [mutation regression test, computed scorecard, staged
  count assertion, re-run tests, grader separate commit, REQUEST_CHANGES]

criteria:
  - id: PR-1
    name: scope_match
    question: Does the diff match the work order's pinned IDs and allowed
      scope - no unrequested schema edits, no files outside the declared
      surface?
    anchors:
      "1": Diff silently changes governed files (schemas/, guardrails,
        settings) the order never mentioned.
      "3": In scope but with drive-by edits that belong in their own change.
      "5": Every touched file maps to a pinned ID in the order; out-of-scope
        discoveries are reported, not fixed inline.
  - id: PR-2
    name: schema_change_gate
    question: Does every schema edit ship mutation regression tests in the same
      revision, plus updated instances/runner/docs (the v0.6/v0.7 one-revision
      rule)?
    anchors:
      "1": Schema loosened or extended with zero new tests - a typo'd instance
        would now validate silently.
      "3": Tests added but only positive cases; nothing asserts invalid input
        still rejects.
      "5": tests assert catch AND still-rejects; instances and CHANGELOG move
        in the same revision with the motivating friction ID.
  - id: PR-3
    name: computed_artifacts
    question: Are computed artifacts (scorecards, gate reports, coverage
      numbers) regenerated by their scripts - never hand-edited - with
      regeneration commands stated?
    anchors:
      "1": Numbers in scorecard.yaml or a gate report edited by hand.
      "3": Regenerated but the command/provenance is not recorded.
      "5": '"Reproduce every number below with: python scripts/..." pattern;
        reviewer re-runs and matches.'
  - id: PR-4
    name: grader_beneficiary_separation
    question: Are grader/eval changes separated from the transcripts or
      packages that benefit from them?
    anchors:
      "1": Grader loosened in the same PR as newly-passing outputs.
      "3": Separated but undocumented.
      "5": Separate commits; divergence and regrade documented, unchanged
        FAILs stated (mrh_t04-stays-FAIL pattern).
  - id: PR-5
    name: independent_reverification
    question: Did the reviewer re-verify claims by re-running the scripts,
      tests, and greps - not by trusting the author's summary?
    anchors:
      "1": Verdict based on reading the PR description.
      "3": Tests re-run but headline claims (counts, byte-identical
        assertions) taken on faith.
      "5": Claims like "schemas byte-identical" / "draft count is 0" re-checked
        with fresh commands; discrepancies reported verbatim.
  - id: PR-6
    name: commit_hygiene
    question: Are commits staged with explicit paths and a staged-file-count
      assertion, with bodies naming scope-sensitive files and the review
      trigger, then CI watched to green?
    anchors:
      "1": git add -A into an unrelated commit; push without watching CI.
      "3": Explicit paths but no count assertion or trailer discipline.
      "5": Explicit add per path, count asserted against expectation, rich
        commit body (the repo's 17-commit log style), CI watched to green
        before claiming shipped.
  - id: PR-7
    name: honest_failure_publication
    question: Are the change's own failures and regressions published in the
      diff (FAIL rows, open friction, regression floors) rather than
      massaged?
    anchors:
      "1": Failing rows deleted or thresholds moved to pass.
      "3": Failures acknowledged in prose but absent from the shipped
        artifacts.
      "5": Own FAILs published in comparison docs; "reportable result, not
        something to game"; no pass threshold invented post hoc.

verdict_rule: |
  Score each criterion 1-5.
  REQUEST_CHANGES  - any of PR-2, PR-3, PR-4 at 1, or any criterion at 1 with
                     a concrete failure scenario.
  NEEDS_DISCUSSION - scope (PR-1) ambiguity that only the work-order author
                     can resolve.
  APPROVE          - all criteria >= 3 and mean >= 4; verdict must list what
                     was re-run to verify (PR-5 evidence), not just the score.
