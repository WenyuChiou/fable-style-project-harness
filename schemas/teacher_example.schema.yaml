# ---
# id: SCHEMA-teacher-example
# layer: schema
# purpose: JSON Schema (draft 2020-12) for one teacher_example record (TE-###) in datasets/teacher_examples.jsonl.
# read_when: Adding or validating teacher-example records, or building tooling over the dataset.
# depends_on: [../datasets/teacher_examples.jsonl]
# used_by: [ROUTE-repo-maintenance, ROUTE-eval-design, ROUTE-memory-update]
# tags: [schema, dataset, teacher-example]
# retrieval_keywords: [teacher example shape, TE record, method_steps, principles_applied, source_artifact, synthetic flag]
# ---
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "fable-method-harness/schemas/teacher_example.schema.yaml"
title: Teacher example record (TE-###)
description: >-
  Pinned dataset shape. One JSON object per line in
  datasets/teacher_examples.jsonl. Prefer synthetic: false — records
  grounded in a real, citable episode of the source repo.
type: object
additionalProperties: true
required: [id, task_type, phase, input_summary, method_steps,
           output_summary, principles_applied, source_artifact, synthetic]
properties:
  id:
    type: string
    pattern: "^TE-[0-9]{3}$"
  task_type:
    type: string
    description: Snake_case task type matching the routing vocabulary.
    enum: [phase_review, tool_discovery, pr_review, eval_design,
           memory_update, runtime_export, repo_maintenance, ab_test_design]
  phase:
    type: string
    description: Project phase the episode belongs to (e.g. "day-1", "phase-2").
  input_summary:
    type: string
    description: What the task-giver asked / what state the work started from.
  method_steps:
    type: array
    description: Observable procedural steps, in order — no invented inner monologue.
    minItems: 1
    items: { type: string }
  output_summary:
    type: string
    description: What was actually produced or decided.
  principles_applied:
    type: array
    description: Named principles / decision-rule ids exercised by the episode.
    items: { type: string }
  source_artifact:
    type: object
    description: Grounding pointer — a repo path and/or commit of the source repo.
    additionalProperties: true
    anyOf:
      - required: [repo_path]
      - required: [commit]
    properties:
      repo_path: { type: string }
      commit: { type: string }
  synthetic:
    type: boolean
    description: false = grounded in a real episode (preferred); true = constructed illustration.
