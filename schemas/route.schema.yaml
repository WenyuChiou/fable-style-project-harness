# ---
# id: SCHEMA-route
# layer: schema
# purpose: JSON Schema (draft 2020-12) for one route entry in ROUTES.yaml.
# read_when: Adding or editing a route in ROUTES.yaml, or validating the routing surface.
# depends_on: [../ROUTES.yaml]
# used_by: [ROUTE-repo-maintenance, ROUTE-pr-review]
# tags: [schema, route, routing, progressive-disclosure]
# retrieval_keywords: [route entry shape, start required optional, expected_output, self_check, route schema]
# ---
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "fable-method-harness/schemas/route.schema.yaml"
title: Route entry (ROUTES.yaml)
description: >-
  Shape of a single route in ROUTES.yaml. start is the L0/L2/L3 context
  ladder for project-bound routes, or the single portable entry
  core/GLOBAL_BOOTSTRAP.md for the portable routes (global-orchestration,
  completion-integrity); required is the minimal file set to execute the task;
  optional is escalation material loaded one layer at a time per
  context/L4_progressive_disclosure_policy.md.
type: object
additionalProperties: true
required: [id, task_type, start, required, expected_output, self_check]
properties:
  id:
    type: string
    pattern: "^ROUTE-[a-z0-9-]+$"
  task_type:
    type: string
    description: Snake_case task type matching the datasets' vocabulary.
    enum: [phase_review, tool_discovery, pr_review, eval_design,
           memory_update, runtime_export, repo_maintenance, ab_test_design,
           global_orchestration, completion_integrity, distillation]
  status:
    type: string
    description: Route readiness; "future-work" marks a route whose execution is gated by L2.
    enum: [active, future-work]
    default: active
  start:
    type: array
    description: >-
      Context entry ladder — L0, L2, L3, in that order, for project-bound
      routes. Portable routes (ROUTE-global-orchestration,
      ROUTE-completion-integrity, and ROUTE-distillation) instead start at
      core/GLOBAL_BOOTSTRAP.md only (the ladder is project-bound and must not
      load in non-mhc sessions).
    items: { type: string }
    oneOf:
      - minItems: 3                            # project-bound L0/L2/L3 ladder
      - const: ["core/GLOBAL_BOOTSTRAP.md"]    # portable-core entry (ROUTE-global-orchestration)
  required:
    type: array
    description: Repo-relative paths that MUST be loaded to execute this route.
    minItems: 1
    uniqueItems: true
    items: { type: string }
  optional:
    type: array
    description: Escalation-only paths (failure modes, edge cases, bad+critique pairs).
    uniqueItems: true
    items: { type: string }
  expected_output:
    type: string
    description: 1-2 line statement of the deliverable this route produces.
  self_check:
    type: array
    description: 3-5 pre-return checks, each referencing rubric criterion ids.
    minItems: 3
    maxItems: 5
    items: { type: string }
