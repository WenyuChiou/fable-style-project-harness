# ---
# id: SCHEMA-review-report
# layer: schema
# purpose: JSON Schema (draft 2020-12) for one AI-review / adaptive-harness review report - the shared report contract both systems write and read, so they never fork formats.
# read_when: Writing or validating reports/ai-review/latest.json, reports/harness/latest.json, a history JSONL row's parent report, or wiring a new review mode.
# depends_on: [./recommendation.schema.yaml]
# used_by: [SCRIPT-run-ai-review, PROMPT-ai-review-modes, DOC-codex-delegation-policy]
# tags: [schema, ai-review, adaptive-harness, report, shared-contract]
# retrieval_keywords: [review report shape, report schema, shared review schema, ai review json, source mode metrics, issues found recommendations, next review trigger]
# ---
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "fable-method-harness/schemas/review_report.schema.yaml"
title: Review report (AI-review / adaptive-harness shared contract)
description: >-
  One review run's structured output. Producers: scripts/run_ai_review.py
  (deterministic collectors + optional --ingest of LLM findings) and, from
  Phase 2 on, the adaptive-harness runner. Consumers: the /ai-review slash
  command, the adaptive-harness skill (reads latest.json + history), and
  humans reading the rendered Markdown twin. Deterministic fields are
  computed by the runner (DR-004 computed-not-claimed); semantic arrays
  (recommendations, obsolete_scaffolding, ...) are filled only via validated
  LLM ingest and stay empty otherwise - an empty array plus an
  unresolved_questions entry is the honest UNSCORED form (DR-011).
type: object
additionalProperties: true
required:
  - review_id
  - review_date
  - source
  - mode
  - files_inspected
  - components_inspected
  - issues_found
  - obsolete_scaffolding
  - inefficient_invocations
  - recommendations
  - experiments_proposed
  - changes_made
  - unresolved_questions
  - metrics
  - next_review_trigger
properties:
  review_id:
    type: string
    description: "Unique run id, e.g. air-20260706-181500-standard_review."
    pattern: "^[a-z]+-[0-9]{8}-[0-9]{6}-[a-z_]+$"
  review_date:
    type: string
    description: ISO-8601 timestamp of the run.
  source:
    type: string
    enum: [ai_review, adaptive_harness, scheduled_runner, manual_review]
    description: >-
      Which system produced the report. scheduled_runner marks headless
      report-only runs (deterministic scans only, no ledger writes, no
      proposals, no application of anything - the doctrine carve-out).
  mode:
    type: string
    description: >-
      Review mode. AI-review modes: standard_review, harness_cleanup_review,
      code_invocation_review, codex_delegation_review, scheduled_review,
      diff_review, experiment_review. Adaptive-harness modes (Phase 2):
      harness_inventory, harness_cleanup_review, code_invocation_review,
      ai_review_integration, skill_fit_review, diff_only_review,
      scheduled_harness_review, experiment_design, patch_proposal,
      rolling_improvement_review. Open string so Phase-2+ modes need no
      schema change; unknown modes are a runner-level error, not a schema one.
  target:
    type: string
    description: Repo/directory the review inspected.
  files_inspected:
    type: array
    items: { type: string }
  components_inspected:
    type: object
    description: "Category -> count map (prompts, routes, scripts, schemas, docs, hooks, skills, commands, subagents, ...)."
  issues_found:
    type: array
    description: Deterministic findings computed by collectors (missing paths, INDEX drift, deprecated markers, stale pointers).
    items:
      type: object
      required: [id, severity, category, description]
      properties:
        id: { type: string }
        severity: { type: string, enum: [P0, P1, P2, P3] }
        category: { type: string }
        file_path: { type: string }
        description: { type: string }
        source: { type: string, description: "Collector that produced it (deterministic) or 'ingest'." }
  obsolete_scaffolding:
    type: array
    description: Semantic findings (LLM ingest) - components kept by inertia. Recommendation-shaped.
    items: { "$ref": "recommendation.schema.yaml" }
  inefficient_invocations:
    type: array
    description: Invocation-efficiency findings (LLM ingest or Phase-2 invocation audit script).
    items:
      type: object
      required:
        - invocation_name
        - invocation_type
        - current_usage_scenario
        - value_provided
        - likely_cost
        - recommendation
        - expected_efficiency_gain
        - risk_if_changed
        - suggested_test
      properties:
        invocation_name: { type: string }
        invocation_type:
          type: string
          enum: [script, shell command, tool, subagent, Codex, LLM-only, hybrid, hook]
        current_usage_scenario: { type: string }
        value_provided: { type: string }
        likely_cost: { type: string, description: "latency / token / tool calls / merge overhead / review burden" }
        can_be_merged: { type: string }
        can_be_replaced_by_deterministic_code: { type: string }
        can_be_replaced_by_LLM_reasoning: { type: string }
        should_be_cached: { type: string }
        should_be_removed: { type: string }
        recommendation:
          type: string
          enum: [Keep, Simplify, Merge, Replace, Cache, Remove, Experiment]
        expected_efficiency_gain: { type: string }
        risk_if_changed: { type: string }
        suggested_test: { type: string }
  codex_delegation_findings:
    type: array
    description: Codex-routing findings (codex_delegation_review mode). Recommendation-shaped.
    items: { "$ref": "recommendation.schema.yaml" }
  recommendations:
    type: array
    description: The merged, validated recommendation records (the adaptive-harness rolling loop consumes these).
    items: { "$ref": "recommendation.schema.yaml" }
  experiments_proposed:
    type: array
    description: Benchmark / A-B cases proposed or still unresolved, linked by linked_recommendation_id.
    items:
      type: object
      required: [case_name, status]
      properties:
        case_name: { type: string }
        task_type: { type: string }
        variant_a: { type: string }
        variant_b: { type: string }
        status: { type: string, enum: [proposed, running, completed, rejected] }
        linked_recommendation_id: { type: string }
  changes_made:
    type: array
    description: >-
      What this run actually changed. ALWAYS empty for runner-only and
      scheduled_runner reports (the runner never edits harness files);
      an LLM session may record applied, human-approved edits here.
    items: { type: string }
  unresolved_questions:
    type: array
    items: { type: string }
  metrics:
    type: object
    description: "Computed numbers only (DR-004): runtime_sec, collector statuses, counts, external telemetry summaries."
  next_review_trigger:
    type: string
    description: "When/what should review next (e.g. 'diff_review after next harness commit; weekly standard_review')."
  dry_run:
    type: boolean
    description: True when the run wrote nothing to disk.
