# id: OM-decision-rules
# layer: operating_model
# purpose: Standing decision rules distilled from observable behavior in
#   method-harness-compiler commits and docs. Each rule cites a real instance.
# read_when: Any judgment call during execution, review, or publication.
# depends_on: [./operating_model.md, ./review_protocol.md, ./phase_gates.md]
# used_by: [ROUTE-phase-review, ROUTE-tool-discovery, ROUTE-pr-review,
#   ROUTE-eval-design, ROUTE-memory-update, ROUTE-runtime-export,
#   ROUTE-repo-maintenance, ROUTE-ab-test-design]
# tags: [rules, discipline, honesty, no-fabrication]
# retrieval_keywords: decision rules, deterministic first, TODO_FILL, never
#   guess, computed artifacts, frozen transcripts, publish failures, halt

rules:
  - id: DR-001
    rule: deterministic-before-model
    detail: Use scripts/schemas/templates (tier 0) before any LLM call; generators run with no LLM and no network.
    rationale: Cheapest reliable method that passes quality thresholds; deterministic output is auditable and regression-pinnable.
    real_instance: "91b982b: generators 'deterministic-first (tier-0: no LLM, no network)'; docs/model_routing_policy.md section 2."
  - id: DR-002
    rule: todo-on-uncertainty-never-guess
    detail: Anything unclassifiable or unverified emits a TODO_FILL stub that FAILS validation until a human fills it.
    rationale: A failing marker cannot be mistaken for knowledge; fabrication becomes structurally impossible.
    real_instance: "9532648: fresh phc new package FAILS validate on TODO_FILL 'nothing fabricated, ever'; 91b982b: 'uncertainty always emits TODO_FILL stubs, never guesses'."
  - id: DR-003
    rule: grader-fix-lands-separately-from-beneficiary
    detail: Never loosen or fix a grader in the same change whose results it would improve; publish the divergence, fix next round.
    rationale: Removes the incentive to game; keeps the eval trustworthy.
    real_instance: "f8740f8: mrh_t01 grader 'deliberately NOT loosened in the change that would benefit from it'; v2 landed separately in 9532648."
  - id: DR-004
    rule: computed-artifacts-only-via-runners
    detail: Scorecards, gate numbers, and outcome results are emitted by runners, never hand-edited; on conflict the computed artifact wins.
    rationale: Design-review finding C2 — self-assigned scores are the fabrication pattern the project exists to prevent.
    real_instance: "046d0e3 computed scorecard + two-scorecard rule; f8740f8 'both computed scorecards regenerated by the runner only'."
  - id: DR-005
    rule: frozen-transcripts-immutable
    detail: Captured transcripts are never edited; grader changes regrade the unchanged transcripts via the runner.
    rationale: The transcript is the evidence; editing evidence destroys the eval.
    real_instance: "CHANGELOG v0.7 DISCLOSURE_MARKERS: 'the frozen transcripts are unchanged and regraded via the runner'."
  - id: DR-006
    rule: explicit-path-staging-with-count-assertion
    detail: Stage files by explicit path and assert the staged count equals the expected count; exclude in-flight concurrent files by name.
    rationale: Prevents silently committing unrelated or half-done work.
    real_instance: "510b79f: 'Explicit-path staging (6 files asserted)'; 490470d excludes concurrent M2a files."
  - id: DR-007
    rule: corrections-append-never-overwrite
    detail: Wrong published claims get a correction notice prepended and results recomputed; JSONL memory records are superseded by new lines, never rewritten.
    rationale: The error's history is part of the record; overwriting is concealment.
    real_instance: "2917804: rp04 'corrected per adversarial review ... top-of-file correction notice'; docs/memory_strategy.md: 'records are never rewritten in place'."
  - id: DR-008
    rule: friction-recorded-not-absorbed
    detail: During a frozen-contract round, chafe is inventoried in the gate report; a ratified subset is resolved later in one batched standard revision with friction-ID mapping.
    rationale: Keeps the gate honest and turns pain into an empirical requirements list.
    real_instance: "docs/n2_gate_report.md (13 N=2 + 22 N=3 items) -> CHANGELOG_STANDARD.md v0.6 / v0.7 resolutions tables."
  - id: DR-009
    rule: publish-own-failures
    detail: FAILs, UNSCORED counts, defective runs, and misses ship in the README/report with the same prominence as wins.
    rationale: Honest-failure publishing is the trust product.
    real_instance: "1c4a77f README 'we publish our failures' (evidence_grounding 0.5, two behavioral FAILs, 26 UNSCORED); f8740f8 publishes harness FAIL mrh_t04; 2917804 preserves the defective web-search run."
  - id: DR-010
    rule: halt-is-success
    detail: A workflow scope-gate HALT, an UNSCORED verdict, and a NO_GO gate outcome are correct outputs, not errors to route around.
    rationale: The invariant workflow stages mandate an honest-refusal HALT; gates must be failable.
    real_instance: "CHANGELOG M1a workflow contract: 'scope gate with honest-refusal HALT'; e7f0fc6 pipeline SVG has an 'animated HALT branch'."
  - id: DR-011
    rule: no-silent-pass
    detail: Skipped or inapplicable checks are RECORDED (not_applicable / UNSCORED with reason); unknown grader keys and missing transcripts are UNSCORED, never passed.
    rationale: A check that can silently pass will eventually silently lie.
    real_instance: "f8740f8 grader registry 'unknown key / missing transcript => UNSCORED with reason — no silent pass'; n2_gate_report: person checks 'recorded, never crashed, never silently passed'."
  - id: DR-012
    rule: read-only-discovery-never-execute
    detail: Tool discovery never installs, executes, or signs up for anything; live probes are recorded as offline fixtures and CI tests monkeypatch HTTP to RAISE.
    rationale: Spec 9.5; discovery must not create an attack or side-effect surface.
    real_instance: "510b79f 'zero installs, zero executions, zero signups'; 91b982b 'e2e tests monkeypatch http to RAISE, CI can never hit the network'."
  - id: DR-013
    rule: clean-break-renames-while-prerelease
    detail: While private/pre-release, schemas + instances + runner + tests + docs move in ONE revision with no deprecated alias layer.
    rationale: Alias layers are maintenance debt with no consumer yet.
    real_instance: "CHANGELOG v0.6: 'clean breaks — no deprecated aliases'; same discipline restated for v0.7."
  - id: DR-014
    rule: regression-net-ships-with-contract-change
    detail: Every schema/contract change lands with mutation regression tests in the same commit (reverting the change fails the suite).
    rationale: A contract only exists if something breaks when it is violated.
    real_instance: "f8740f8: 'Mutation regression tests: reverting any rename fails the suite'; tests/test_v07_friction_regressions.py."
  - id: DR-015
    rule: pin-measured-numbers-as-floors-never-invent-bars
    detail: State measured gate numbers, name the misses, let the maintainer set the bar; pin measured values as regression floors.
    rationale: An invented pass threshold after seeing results is self-grading.
    real_instance: "docs/comparisons/generator_fixture_gate.md: 'No pass threshold is invented here'; tests/test_generator_gate.py floors (91b982b)."
  - id: DR-016
    rule: pre-registration-before-runs-and-commit-it-first
    detail: Corpus, pass criteria, probe wording, exclusion log, AND run environment are frozen before any model call; the pre-registration commit must land before run commits so git evidences ordering.
    rationale: Post-hoc criteria are unfalsifiable; asserted ordering is weaker than commit-evidenced ordering.
    real_instance: "5d96fd6 honesty note + 'PROTOCOL FOR FUTURE ROUNDS'; N3-F12 (pre-register tools-disabled)."
  - id: DR-017
    rule: attribution-caps-enforced-as-code
    detail: Third-party compilations are never direct_quote; quoted_primary requires primary_artifact_locator (schema-enforced); unfetched carriers stay capped at third_party_interpretation.
    rationale: Attribution strength must be earned by verification, not asserted.
    real_instance: "d7603e3: 'every Isaacson-biography / press-quoted card capped at third_party_interpretation, enforced by a new regression test'; CHANGELOG v0.7 quoted_primary allOf/if/then."
  - id: DR-018
    rule: drafts-never-write-governed-filenames
    detail: Machine output goes to .generated.yaml siblings; overwrite requires --force; promotion to a governed filename is a human act after filling every TODO_FILL.
    rationale: Keeps machine drafts and human-vetted ground truth mechanically distinguishable.
    real_instance: "CHANGELOG v0.7.1 draft convention; 91b982b reviewer P1: recommend-tools rerouted through the shared write_generated overwrite guard."
  - id: DR-019
    rule: risk-computed-from-conservative-proxies-with-basis
    detail: When no source publishes risk/permission metadata, compute it from documented proxy signals; unknown maps to medium risk + read_only ASSUMED UNVERIFIED; every rule emits its basis.
    rationale: Conservative computed risk beats absent or vibes-based risk.
    real_instance: "510b79f finding 'NO registry publishes permission/risk metadata'; 91b982b assess_candidate 'conservative unknown => medium ... every rule emits a basis'."
  - id: DR-020
    rule: single-source-of-truth-for-checks
    detail: CLI subcommands import the runner's check functions; gate scripts import the coverage functions the CLI prints from — checks are never forked.
    rationale: Forked checks drift and disagree silently.
    real_instance: "CHANGELOG conformance tooling: 'checks are imported from scripts/run_evals.py (single source of truth; the CLI never forks them)'; generator_fixture_gate.md 'No scoring logic is forked'."
  - id: DR-021
    rule: verify-agent-observations-on-disk
    detail: When parallel agents report conflicting observations, adjudicate by direct on-disk verification, never by majority or recency.
    rationale: Agent reports go stale; the filesystem does not.
    real_instance: "490470d: zh-TW mermaid conflict 'resolved by on-disk verification (0/0/0 mermaid, 6/6/6 fences)'."
  - id: DR-022
    rule: extend-marker-lists-never-loosen-ad-hoc
    detail: Deterministic grader constants grow only by documented-list extension with a pinned regression fixture for the exact missed case; broad patterns that could match non-cases are rejected.
    rationale: Ad-hoc loosening turns a grader into a rubber stamp.
    real_instance: "CHANGELOG v0.7 DISCLOSURE_MARKERS: added 'no impersonation', 'deliberately NOT a broad marker'; 9532648 pinned evasion fixture."
  - id: DR-023
    rule: auto-discover-per-package-constants
    detail: Anything a new package must be hand-added to (test lists, runner dicts) is a silent-exclusion bug; replace with declaration-by-the-package or glob auto-discovery.
    rationale: The N=4 wall — hard-coded lists silently exclude the newest package from enforcement.
    real_instance: "v0.7: conftest PACKAGES auto-discovered (N3-F15); ADVISORY_FOOTERS dict DELETED, footer package-declared with no fallback (N3-F14)."
