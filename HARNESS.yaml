# fable-method-harness — package manifest
# Distilled from observable artifacts of method-harness-compiler only;
# v0.2.0 adds the adaptive layer (AI-review + adaptive-harness runners,
# shared review schemas, benchmarks, skill adapter).
name: fable-method-harness
version: 0.2.0
entrypoint: context/L0_bootstrap.md
provenance:
  distilled_from: method-harness-compiler@965c68e
  date: 2026-07-02
  sources: observable artifacts only
  source_classes:
    - docs (design_review, n2_gate_report, CHANGELOG_STANDARD, development_plan,
      evaluation_framework, comparisons/*, audits/*, quality/*)
    - git log with full commit bodies and trailers
    - schemas/
    - scripts/
    - tests/
    - the three example packages (quality_value_investing, manuscript_review,
      first_principles_engineering)
layers:
  - context        # L0-L5 progressive-disclosure layers (context/)
  - core           # portable any-project discipline subset (core/), entered via core/GLOBAL_BOOTSTRAP.md
  - operating_model  # the distilled method skeleton (operating_model/)
  - playbook       # step-by-step procedures, PLAYBOOK-* (playbooks/)
  - rubric         # scoring/review rubrics, RUBRIC-* (rubrics/)
  - example        # worked examples grounded in real episodes (examples/)
  - dataset        # JSONL records: TE-### / FM-### / EC-### / RE-### (datasets/)
  - prompt         # reusable prompt fragments, never hidden internals (prompts/)
  - validation     # smoke tests and consistency checks (validation/)
  - memory         # append-only corrections and friction records (memory/)
  - schema         # record shapes for datasets and frontmatter (schemas/)
  - doc            # meta-documentation (docs/)
routes_file: ROUTES.yaml
routes:
  - ROUTE-phase-review
  - ROUTE-tool-discovery
  - ROUTE-pr-review
  - ROUTE-eval-design
  - ROUTE-memory-update
  - ROUTE-runtime-export
  - ROUTE-repo-maintenance
  - ROUTE-ab-test-design
  - ROUTE-global-orchestration   # portable core; start = core/GLOBAL_BOOTSTRAP.md, not the L0/L2/L3 ladder
  - ROUTE-completion-integrity   # portable; completion/done-claim/artifact-validation — overlay REQUIRED
  - ROUTE-distillation           # portable; working-style distillation cycle — trace-based, blind analyst, load-bearing gate
portability_targets:
  - claude_code
  - codex
  - cursor
  - opencode
  - hermes
  - agents_md_convention
  - local agents
constraints:
  - public_safe_after_human_review   # repo is PUBLIC (docs/publication_status.md); every commit world-readable; safety review repeats before major publication events
  - no_secrets               # no keys, tokens, contact info, private chats, local telemetry
  - no_hidden_reasoning      # no invented system prompts or chain-of-thought
